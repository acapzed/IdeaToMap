services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mindmap_backend
    ports:
      - "3001:3001"
    environment:
      - AI_BASE_URL=https://api.groq.com/openai/v1
      - AI_MODEL=llama-3.3-70b-versatile
      - AI_API_KEY=${GROQ_API_KEY}
      - PORT=3001
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mindmap_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped
